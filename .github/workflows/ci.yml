name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build binaries
        run: |
          mkdir -p build
          g++ -std=c++17 -O2 -pthread -Isrc src/main.cpp -o build/kvnode
          g++ -std=c++17 -O2 -pthread -Isrc src/client/workload.cpp -o build/kv_workload

      - name: Verify binaries
        run: |
          test -x build/kvnode
          test -x build/kv_workload

      - name: Run integration tests
        run: |
          python3 tests/test_kvstore.py
          python3 tests/test_implementation.py
